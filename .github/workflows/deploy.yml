name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        # Create SSH folder
        # Add private key stored on github
        # Set permissions
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 187.77.177.77 >> ~/.ssh/known_hosts

      - name: Deploy (with retry)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: |
            ssh -o ConnectTimeout=10 -o StrictHostKeyChecking=no -o IdentitiesOnly=yes depeloy@187.77.177.77 << 'EOF'

            # Stop if any command fails
            set -e

            cd /var/www/geographic-data-explorer

            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            EOF
